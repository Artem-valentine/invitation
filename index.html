<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>

</head>

<body>

<div class="background"></div>

<main class="feed">

<!-- HERO -->

<section class="hero">

<img src="assets/header.jpg">

<div class="heroOverlay">

<span class="event">

ПИКНИК

</span>

<div class="heroInfo">

<div>

<span>

Адрес

</span>

<p>

ул. Цветочная 5

</p>

</div>

<div>

<span>

Время

</span>

<p>

18:00–23:00

</p>

</div>

</div>

</div>

</section>

<!-- GRID -->

<section class="grid">

<div class="card blue large">

<h2>

7

</h2>

<h3>

JUNE

</h3>

<p>

Воскресенье

</p>

</div>

<div class="card cream">

<span>

DATE

</span>

<h4>

Приглашение

на свидание

</h4>

</div>

<div class="card photo">

<img src="assets/photo1.jpg">

</div>

<div class="card photo">

<img src="assets/photo2.jpg">

</div>

<div class="card blue wide">

<p class="small">

Заберёт водитель

в 17:40

</p>

</div>

</section>

<!-- MESSAGE -->

<section class="message">

<div class="card white">

<h2>

Я хочу провести этот вечер только с тобой ❤️

</h2>

<p>

Будет вкусный ужин.

Красивое место.

Прогулка.

Фотографии.

И небольшой сюрприз.

</p>

</div>

</section>

<!-- GALLERY -->

<section class="gallery">

<div class="card imageTall">

<img src="assets/photo3.jpg">

</div>

<div class="card imageTall">

<img src="assets/photo4.jpg">

</div>

</section>

<!-- MAP -->

<section class="mapCard">

<div class="card white">

<h2>

Место встречи

</h2>

<iframe

src="https://maps.google.com/maps?q=Москва&t=&z=14&ie=UTF8&iwloc=&output=embed"

loading="lazy">

</iframe>

</div>

</section>

<!-- RSVP -->

<section class="rsvp">

<div class="card blue rsvpCard">

<h2>

Ты придёшь?

</h2>

<button id="accept">

Конечно ❤️

</button>

</div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
