<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>

</head>

<body>

<div class="bg"></div>

<main class="app">

    <!-- HERO -->

    <section class="hero">

        <img src="assets/header.jpg" alt="">

        <div class="overlay">

            <span class="eyebrow">
                ПИКНИК
            </span>

            <div class="heroBottom">

                <div>

                    <small>Адрес</small>

                    <p>ул. Цветочная 5</p>

                </div>

                <div>

                    <small>Время</small>

                    <p>18:00–23:00</p>

                </div>

            </div>

        </div>

    </section>

    <!-- APPLE GRID -->

    <section class="cards">

        <article class="card blue date">

            <span class="label">
                DATE
            </span>

            <h2>7</h2>

            <h3>JUNE</h3>

            <p>Воскресенье</p>

        </article>

        <article class="card sand">

            <span class="label dark">
                INVITATION
            </span>

            <h2>

                Приглашение

                <br>

                на свидание

            </h2>

        </article>

        <article class="card photo">

            <img src="assets/photo1.jpg">

        </article>

        <article class="card route blue">

            <p>

                🚗

                Заберёт водитель

                <br>

                в 17:40

            </p>

        </article>

        <article class="card white">

            <span class="label dark">

                ПРОГРАММА

            </span>

            <ul>

                <li>🍷 Ужин</li>

                <li>🌇 Прогулка</li>

                <li>📸 Фото</li>

                <li>🎁 Сюрприз</li>

            </ul>

        </article>

        <article class="card photoTall">

            <img src="assets/photo2.jpg">

        </article>

        <article class="card white quote">

            <h2>

                Этот вечер

                только

                для нас ❤️

            </h2>

        </article>

        <article class="card map">

            <iframe

            src="https://maps.google.com/maps?q=Москва&t=&z=14&ie=UTF8&iwloc=&output=embed"

            loading="lazy">

            </iframe>

        </article>

        <article class="card blue confirm">

            <h2>

                Ты придёшь?

            </h2>

            <button id="accept">

                Конечно ❤️

            </button>

            <p id="message"></p>

        </article>

    </section>

</main>

<script src="script.js"></script>

</body>

</html>
